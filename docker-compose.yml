services:
  mongo:
    image: database
    build:
      context: ./mongo
      dockerfile: Dockerfile
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: backend
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=mongodb://mongo:27017/stackoverflow
      - PORT=8080
    depends_on:
      - mongo

  frontend:
    image: frontend
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
